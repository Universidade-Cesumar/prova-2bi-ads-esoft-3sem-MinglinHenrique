<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Almoxarifado</title>
</head>
<body id="Corpo">
    <div id="Titulo">
    <h1>Sistema Almoxarifado</h1>
    </div>
    <div id="InputBotao">
        <h2>Cadastrar Materiais:</h2>
        <input id="input-nome" type="text"placeholder="Nome">
        <input id="input-quantidade" type="number" placeholder="Quantidade">
        <button id="btn-cadastrar">Cadastrar</button>
    </div>
    <div id="ListaL">
        <h2>Lista de Materiais:</h2>
        <p id="total-itens">Total de itens: 0</p>
        <div id="InputBusca">
            <input id="input-busca" type="text" placeholder="Busca">
        </div>
        <table>
    <thead>
        <tr>
            <th id="NomeM">Nome</th>
            <th id="QuantM">Quantidade</th>
            <th id="AcaoM">Ações</th>
        </tr>
    </thead>

    <tbody id="lista-materiais">
    </tbody>
</table>
    <div id="InputRetirada">
        <h2>Retirada de Materiais:</h2>
        <input id="input-retirada" type="number" placeholder="Quantidade a retirar">
    </div>
    </div>
</body>
<script src="main.js"></script>
</html>
